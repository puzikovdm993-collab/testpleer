<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный Проигрыватель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .player-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .player-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .album-art {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 20s linear infinite;
            animation-play-state: paused;
        }

        .album-art.playing {
            animation-play-state: running;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .album-art i {
            font-size: 80px;
            color: white;
        }

        .song-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .song-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .song-artist {
            font-size: 14px;
            color: #666;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #333;
            font-size: 24px;
            transition: all 0.3s;
        }

        .btn:hover {
            color: #667eea;
            transform: scale(1.1);
        }

        .btn-play {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
        }

        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .playlist {
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .playlist-item:hover {
            background: #f0f0f0;
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .playlist-item-number {
            width: 30px;
            font-size: 14px;
        }

        .playlist-item-info {
            flex: 1;
        }

        .playlist-item-title {
            font-size: 14px;
            font-weight: bold;
        }

        .playlist-item-artist {
            font-size: 12px;
            opacity: 0.7;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .volume-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 3px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            cursor: pointer;
        }

        .file-input-container {
            margin-top: 15px;
            text-align: center;
        }

        .file-input-label {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.3s;
        }

        .file-input-label:hover {
            transform: scale(1.05);
        }

        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <h1>🎵 Музыкальный Проигрыватель</h1>
        </div>

        <div class="album-art" id="album-art">
            <span>🎵</span>
        </div>

        <div class="song-info">
            <div class="song-title" id="song-title">Выберите песню</div>
            <div class="song-artist" id="song-artist">-</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="prev-btn" title="Предыдущая">⏮</button>
            <button class="btn btn-play" id="play-btn" title="Воспроизвести/Пауза">▶</button>
            <button class="btn" id="next-btn" title="Следующая">⏭</button>
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
            <span>🔊</span>
        </div>

        <div class="file-input-container">
            <label for="file-input" class="file-input-label">
                📁 Добавить музыку
            </label>
            <input type="file" id="file-input" accept="audio/*" multiple>
        </div>

        <div class="playlist" id="playlist"></div>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const songTitle = document.getElementById('song-title');
        const songArtist = document.getElementById('song-artist');
        const albumArt = document.getElementById('album-art');
        const volumeSlider = document.getElementById('volume-slider');
        const fileInput = document.getElementById('file-input');
        const playlistEl = document.getElementById('playlist');

        let playlist = [];
        let currentSongIndex = 0;
        let isPlaying = false;

        // Демо плейлист (можно заменить на свои файлы)
        const demoPlaylist = [
            { title: 'Демо Песня 1', artist: 'Исполнитель 1', src: '' },
            { title: 'Демо Песня 2', artist: 'Исполнитель 2', src: '' },
            { title: 'Демо Песня 3', artist: 'Исполнитель 3', src: '' }
        ];

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function loadSong(index) {
            if (playlist.length === 0) return;
            
            currentSongIndex = index;
            const song = playlist[index];
            
            if (song.src) {
                audio.src = song.src;
                songTitle.textContent = song.title;
                songArtist.textContent = song.artist || 'Неизвестный исполнитель';
                updatePlaylistUI();
            }
        }

        function togglePlay() {
            if (playlist.length === 0) {
                alert('Сначала добавьте музыку!');
                return;
            }

            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
                albumArt.classList.remove('playing');
            } else {
                audio.play();
                playBtn.textContent = '⏸';
                albumArt.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }

        function playNext() {
            if (playlist.length === 0) return;
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) audio.play();
        }

        function playPrev() {
            if (playlist.length === 0) return;
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (isPlaying) audio.play();
        }

        function updateProgress() {
            const percent = (audio.currentTime / audio.duration) * 100;
            progress.style.width = `${percent}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
            durationEl.textContent = formatTime(audio.duration);
        }

        function setProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        }

        function updatePlaylistUI() {
            playlistEl.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="playlist-item-number">${index + 1}</div>
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${song.title}</div>
                        <div class="playlist-item-artist">${song.artist || 'Неизвестный исполнитель'}</div>
                    </div>
                `;
                item.addEventListener('click', () => {
                    loadSong(index);
                    if (isPlaying) audio.play();
                    else togglePlay();
                });
                playlistEl.appendChild(item);
            });
        }

        // Event Listeners
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', playNext);
        progressBar.addEventListener('click', setProgress);
        
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                playlist.push({
                    title: file.name.replace(/\.[^/.]+$/, ''),
                    artist: '',
                    src: url
                });
            });

            if (playlist.length > 0 && !audio.src) {
                loadSong(0);
            }
            updatePlaylistUI();
        });

        // Инициализация
        audio.volume = 0.7;
    </script>
</body>
</html>
